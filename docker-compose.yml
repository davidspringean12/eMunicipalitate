services:
  postgres:
    image: postgres:16-alpine
    container_name: emunicipalitate-db
    environment:
      POSTGRES_DB: emunicipalitate
      POSTGRES_USER: emunicipalitate
      POSTGRES_PASSWORD: changeme_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emunicipalitate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emunicipalitate-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass changeme_dev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "changeme_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: emunicipalitate-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: changeme_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: emunicipalitate-mq
    environment:
      RABBITMQ_DEFAULT_USER: emunicipalitate
      RABBITMQ_DEFAULT_PASS: changeme_dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
